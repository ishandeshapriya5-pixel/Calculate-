<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Vehicle Duty Calculator - 2026</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); font-size: 20px; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; color: #444; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #219150; }
        #result { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; display: none; border: 1px solid #ddd; }
        .res-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
        .total-row { font-size: 18px; font-weight: bold; color: var(--accent); border-top: 2px solid #ddd; margin-top: 10px; padding-top: 10px; }
        .footer { text-align: center; font-size: 11px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Vehicle Duty Calculator (2026)</h2>
    
    <div class="input-group">
        <label>වාහන කාණ්ඩය (HS Code):</label>
        <select id="hsCode">
            <option value="">-- තෝරන්න --</option>
            <optgroup label="Petrol Cars">
                <option value="8703.21.69" data-type="unit" data-rate="1992000">8703.21.69 - Below 1000cc (Unit)</option>
                <option value="8703.21.69_cc" data-type="cc" data-rate="2450">8703.21.69 - Below 1000cc (per CC)</option>
                <option value="8703.22.50" data-type="cc" data-rate="3850">8703.22.50 - 1000-1300cc</option>
                <option value="8703.22.50_15" data-type="cc" data-rate="4450">8703.22.50 - 1300-1500cc</option>
                <option value="8703.23.52" data-type="cc" data-rate="5150">8703.23.52 - 1500-1600cc</option>
                <option value="8703.23.55" data-type="cc" data-rate="6400">8703.23.55 - 1600-1800cc</option>
                <option value="8703.23.59" data-type="cc" data-rate="7250">8703.23.59 - 1800-2000cc</option>
            </optgroup>
            <optgroup label="Hybrid Cars">
                <option value="8703.40.28" data-type="unit" data-rate="1810900">8703.40.28 - Below 1000cc</option>
                <option value="8703.40.35" data-type="cc" data-rate="2750">8703.40.35 - 1000-1300cc</option>
                <option value="8703.40.35_15" data-type="cc" data-rate="3450">8703.40.35 - 1300-1500cc</option>
                <option value="8703.40.51" data-type="cc" data-rate="4800">8703.40.51 - 1500-1600cc</option>
                <option value="8703.40.55" data-type="cc" data-rate="6100">8703.40.55 - 1600-1800cc</option>
            </optgroup>
            <optgroup label="Diesel Cars">
                <option value="8703.31.30" data-type="cc" data-rate="3600">8703.31.30 - Hearses 1500cc</option>
                <option value="8703.31.70" data-type="cc" data-rate="5550">8703.31.70 - Below 1500cc</option>
                <option value="8703.32.30" data-type="cc" data-rate="4800">8703.32.30 - Hearses 1500-2500cc</option>
                <option value="8703.32.52" data-type="cc" data-rate="6950">8703.32.52 - 1500-1600cc</option>
            </optgroup>
            <optgroup label="Electric (EV)">
                <option value="8703.80.31" data-type="kw" data-rate="18100">8703.80.31 - Below 50KW (Below 1Y)</option>
                <option value="8703.80.32" data-type="kw" data-rate="24100">8703.80.32 - 50-100KW (Below 1Y)</option>
            </optgroup>
            <optgroup label="Trucks & Cabs">
                <option value="8704.21.41" data-type="unit" data-rate="724350">8704.21.41 - Diesel Truck < 800kg</option>
                <option value="8704.21.91" data-type="unit" data-rate="6036300">8704.21.91 - Diesel Double Cab</option>
                <option value="8704.31.91" data-type="unit" data-rate="6036300">8704.31.91 - Petrol Double Cab</option>
            </optgroup>
        </select>
    </div>

    <div class="input-group">
        <label>CIF වටිනාකම (Foreign Currency):</label>
        <input type="number" id="cif" placeholder="JPY / USD / GBP ඇතුළත් කරන්න">
    </div>

    <div class="input-group">
        <label>විනිමය අනුපාතිකය (Exchange Rate):</label>
        <input type="number" id="exRate" step="0.0001" placeholder="Ex: 2.0004">
    </div>

    <div class="input-group">
        <label>එන්ජින් ධාරිතාව (CC) / බලය (KW):</label>
        <input type="number" id="capacity" placeholder="Ex: 658 or 1300">
    </div>

    <button type="button" onclick="calculateDuty()">බදු ගණනය කරන්න</button>

    <div id="result">
        <div class="res-row"><span>Value (NCY):</span> <span id="rNcy">0.00</span></div>
        <div class="res-row"><span>CID (20%):</span> <span id="rCid">0.00</span></div>
        <div class="res-row"><span>SUR (50% of CID):</span> <span id="rSur">0.00</span></div>
        <div class="res-row"><span>XID (Excise):</span> <span id="rXid">0.00</span></div>
        <div class="res-row"><span>VAT Base (110%):</span> <span id="rVatBase">0.00</span></div>
        <div class="res-row"><span>VAT (18%):</span> <span id="rVat">0.00</span></div>
        <div class="res-row"><span>VEL:</span> <span id="rVel">15,000.00</span></div>
        <div class="res-row total-row"><span>මුළු බදු මුදල:</span> <span id="rTotal">Rs. 0.00</span></div>
    </div>

    <div class="footer">
        Data updated: 2026.03.14 | Sasiri Associates
    </div>
</div>

<script>
function calculateDuty() {
    const cifVal = document.getElementById('cif').value;
    const exRateVal = document.getElementById('exRate').value;
    const capVal = document.getElementById('capacity').value;
    const hsSelect = document.getElementById('hsCode');
    const option = hsSelect.options[hsSelect.selectedIndex];
    
    if (!cifVal || !exRateVal || !option.value) {
        alert("කරුණාකර සියලු විස්තර ඇතුළත් කරන්න.");
        return;
    }

    const cif = parseFloat(cifVal);
    const exRate = parseFloat(exRateVal);
    const cap = parseFloat(capVal) || 0;

    // 1. Value NCY
    const ncy = cif * exRate;
    
    // 2. CID (20%) & SUR (50% of CID)
    const cid = ncy * 0.20;
    const sur = cid * 0.50;
    
    // 3. XID Calculation
    const rate = parseFloat(option.getAttribute('data-rate'));
    const type = option.getAttribute('data-type');
    let xid = 0;
    if (type === "unit") {
        xid = rate;
    } else {
        xid = rate * cap;
    }

    // 4. VAT Calculation (Base = 110% of NCY + CID + SUR + XID)
    const vatBase = (ncy * 1.1) + cid + sur + xid;
    const vat = vatBase * 0.18;

    // 5. Fixed Fees
    const vel = 15000;
    const other = 1750; // COM/EXM/SEL
    
    const total = cid + sur + xid + vat + vel + other;

    // Displaying Results
    const f = (n) => n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    
    document.getElementById('rNcy').innerText = f(ncy);
    document.getElementById('rCid').innerText = f(cid);
    document.getElementById('rSur').innerText = f(sur);
    document.getElementById('rXid').innerText = f(xid);
    document.getElementById('rVatBase').innerText = f(vatBase);
    document.getElementById('rVat').innerText = f(vat);
    document.getElementById('rTotal').innerText = "Rs. " + f(total);
    
    document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>
